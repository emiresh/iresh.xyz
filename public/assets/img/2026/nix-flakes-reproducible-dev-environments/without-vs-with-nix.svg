<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="900" height="400" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="600">Without Nix vs With Nix</text>

  <!-- Left: Without Nix -->
  <rect x="30" y="55" width="400" height="320" rx="10" fill="#1c1917" stroke="#dc2626" stroke-width="2"/>
  <text x="230" y="82" text-anchor="middle" fill="#fca5a5" font-size="15" font-weight="600">Without Nix</text>

  <!-- Alice -->
  <rect x="55" y="100" width="160" height="72" rx="6" fill="#292524" filter="url(#shadow)"/>
  <text x="135" y="122" text-anchor="middle" fill="#e7e5e4" font-size="12" font-weight="600">Alice (Windows)</text>
  <text x="135" y="140" text-anchor="middle" fill="#a8a29e" font-size="11">Terraform 1.9.3</text>
  <text x="135" y="155" text-anchor="middle" fill="#a8a29e" font-size="11">tflint 0.50</text>

  <!-- Bob -->
  <rect x="245" y="100" width="160" height="72" rx="6" fill="#292524" filter="url(#shadow)"/>
  <text x="325" y="122" text-anchor="middle" fill="#e7e5e4" font-size="12" font-weight="600">Bob (macOS)</text>
  <text x="325" y="140" text-anchor="middle" fill="#a8a29e" font-size="11">Terraform 1.10.0</text>
  <text x="325" y="155" text-anchor="middle" fill="#a8a29e" font-size="11">tflint 0.51</text>

  <!-- CI -->
  <rect x="140" y="195" width="180" height="72" rx="6" fill="#292524" filter="url(#shadow)"/>
  <text x="230" y="217" text-anchor="middle" fill="#e7e5e4" font-size="12" font-weight="600">CI Agent (Ubuntu)</text>
  <text x="230" y="235" text-anchor="middle" fill="#a8a29e" font-size="11">Terraform 1.8.5</text>
  <text x="230" y="250" text-anchor="middle" fill="#a8a29e" font-size="11">tflint ???</text>

  <!-- Result -->
  <rect x="100" y="290" width="260" height="55" rx="6" fill="#7f1d1d"/>
  <text x="230" y="315" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">Different versions everywhere</text>
  <text x="230" y="333" text-anchor="middle" fill="#fca5a5" font-size="11">"Works on my machine"</text>

  <!-- Lines to result -->
  <line x1="135" y1="172" x2="200" y2="290" stroke="#dc2626" stroke-width="1" stroke-dasharray="4"/>
  <line x1="325" y1="172" x2="260" y2="290" stroke="#dc2626" stroke-width="1" stroke-dasharray="4"/>
  <line x1="230" y1="267" x2="230" y2="290" stroke="#dc2626" stroke-width="1" stroke-dasharray="4"/>

  <!-- Right: With Nix -->
  <rect x="470" y="55" width="400" height="320" rx="10" fill="#022c22" stroke="#16a34a" stroke-width="2"/>
  <text x="670" y="82" text-anchor="middle" fill="#86efac" font-size="15" font-weight="600">With Nix Flakes</text>

  <!-- Alice -->
  <rect x="495" y="100" width="160" height="55" rx="6" fill="#14532d" filter="url(#shadow)"/>
  <text x="575" y="122" text-anchor="middle" fill="#bbf7d0" font-size="12" font-weight="600">Alice</text>
  <text x="575" y="140" text-anchor="middle" fill="#86efac" font-size="11">cd project/</text>

  <!-- Bob -->
  <rect x="685" y="100" width="160" height="55" rx="6" fill="#14532d" filter="url(#shadow)"/>
  <text x="765" y="122" text-anchor="middle" fill="#bbf7d0" font-size="12" font-weight="600">Bob</text>
  <text x="765" y="140" text-anchor="middle" fill="#86efac" font-size="11">cd project/</text>

  <!-- CI -->
  <rect x="590" y="100" width="100" height="55" rx="6" fill="#14532d" filter="url(#shadow)" visibility="hidden"/>

  <!-- flake.lock (center) -->
  <rect x="600" y="185" width="140" height="55" rx="6" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="670" y="210" text-anchor="middle" fill="#292524" font-size="13" font-weight="700">flake.lock</text>
  <text x="670" y="227" text-anchor="middle" fill="#451a03" font-size="10">single source of truth</text>



  <!-- Lines to flake.lock -->
  <line x1="575" y1="155" x2="640" y2="185" stroke="#16a34a" stroke-width="2"/>
  <line x1="765" y1="155" x2="700" y2="185" stroke="#16a34a" stroke-width="2"/>

  <!-- CI Agent with Nix -->
  <rect x="505" y="175" width="70" height="45" rx="6" fill="#14532d" filter="url(#shadow)"/>
  <text x="540" y="197" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="600">CI</text>
  <text x="540" y="212" text-anchor="middle" fill="#86efac" font-size="9">nix build</text>
  <line x1="575" y1="200" x2="600" y2="210" stroke="#16a34a" stroke-width="2"/>

  <!-- Result -->
  <rect x="540" y="265" width="260" height="80" rx="6" fill="#14532d"/>
  <text x="670" y="290" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">Everyone gets identical tools</text>
  <text x="670" y="310" text-anchor="middle" fill="#86efac" font-size="11">Terraform 1.9.3 — everywhere</text>
  <text x="670" y="328" text-anchor="middle" fill="#86efac" font-size="11">tflint 0.50.0 — everywhere</text>

  <!-- Line from lock to result -->
  <line x1="670" y1="240" x2="670" y2="265" stroke="#16a34a" stroke-width="2"/>
</svg>
