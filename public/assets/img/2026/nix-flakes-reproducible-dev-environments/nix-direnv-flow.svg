<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="900" height="320" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="600">How Nix Flakes + direnv Work Together</text>

  <!-- Step 1: cd project/ -->
  <rect x="30" y="80" width="110" height="60" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="85" y="107" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">cd project/</text>
  <text x="85" y="125" text-anchor="middle" fill="#bfdbfe" font-size="10">you type this</text>

  <!-- Arrow -->
  <line x1="140" y1="110" x2="170" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: .envrc -->
  <rect x="175" y="80" width="100" height="60" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="225" y="107" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">.envrc</text>
  <text x="225" y="125" text-anchor="middle" fill="#ddd6fe" font-size="10">use flake</text>

  <!-- Arrow -->
  <line x1="275" y1="110" x2="305" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: flake.nix -->
  <rect x="310" y="80" width="100" height="60" rx="8" fill="#10b981" filter="url(#shadow)"/>
  <text x="360" y="107" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">flake.nix</text>
  <text x="360" y="125" text-anchor="middle" fill="#a7f3d0" font-size="10">tool list</text>

  <!-- Arrow -->
  <line x1="410" y1="110" x2="440" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: flake.lock -->
  <rect x="445" y="80" width="100" height="60" rx="8" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="495" y="107" text-anchor="middle" fill="#292524" font-size="13" font-weight="600">flake.lock</text>
  <text x="495" y="125" text-anchor="middle" fill="#451a03" font-size="10">pinned versions</text>

  <!-- Arrow -->
  <line x1="545" y1="110" x2="575" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: /nix/store -->
  <rect x="580" y="80" width="110" height="60" rx="8" fill="#ef4444" filter="url(#shadow)"/>
  <text x="635" y="107" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">/nix/store/</text>
  <text x="635" y="125" text-anchor="middle" fill="#fecaca" font-size="10">cached packages</text>

  <!-- Arrow -->
  <line x1="690" y1="110" x2="720" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 6: $PATH -->
  <rect x="725" y="70" width="150" height="80" rx="8" fill="#1e40af" filter="url(#shadow)"/>
  <text x="800" y="95" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">$PATH updated</text>
  <text x="800" y="115" text-anchor="middle" fill="#93c5fd" font-size="11">terraform</text>
  <text x="800" y="130" text-anchor="middle" fill="#93c5fd" font-size="11">tflint, pre-commit</text>
  <text x="800" y="145" text-anchor="middle" fill="#93c5fd" font-size="11">shellcheck, shfmt</text>

  <!-- Bottom: cd .. flow -->
  <text x="450" y="195" text-anchor="middle" fill="#64748b" font-size="14">When you leave:</text>

  <rect x="250" y="215" width="110" height="50" rx="8" fill="#475569" filter="url(#shadow)"/>
  <text x="305" y="240" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">cd ..</text>
  <text x="305" y="256" text-anchor="middle" fill="#cbd5e1" font-size="10">you leave</text>

  <line x1="360" y1="240" x2="420" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="425" y="215" width="150" height="50" rx="8" fill="#475569" filter="url(#shadow)"/>
  <text x="500" y="240" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">direnv unloads</text>
  <text x="500" y="256" text-anchor="middle" fill="#cbd5e1" font-size="10">reverts $PATH</text>

  <line x1="575" y1="240" x2="635" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="640" y="215" width="170" height="50" rx="8" fill="#7f1d1d" filter="url(#shadow)"/>
  <text x="725" y="240" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">tools gone from PATH</text>
  <text x="725" y="256" text-anchor="middle" fill="#fca5a5" font-size="10">completely isolated</text>

  <!-- Footer -->
  <text x="450" y="305" text-anchor="middle" fill="#475569" font-size="12">Each project has its own flake.nix — different projects can use different tool versions</text>
</svg>
